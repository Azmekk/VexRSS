{{define "source_row"}}
<li class="source-row" id="source-{{.ID}}" style="--hue:{{hueFor .Title}};">
  <span class="source-row__dot" aria-hidden="true"></span>
  <div class="source-row__main">
    <input
      class="source-row__name"
      type="text"
      name="title"
      value="{{.Title}}"
      maxlength="80"
      autocomplete="off"
      spellcheck="false"
      aria-label="Name for this source"
      hx-patch="/sources/{{.ID}}"
      hx-trigger="change, keydown[key==='Enter']"
      hx-target="#source-{{.ID}}"
      hx-swap="outerHTML">
    <div class="source-row__meta">
      <span class="source-row__url" title="{{.FeedURL}}">{{hostOf .FeedURL}}</span>
      {{with timeAgo .LastFetch}}<span class="source-row__fetched">updated {{.}}</span>{{end}}
    </div>
  </div>
  <div class="source-row__actions">
    <button class="icon-btn" type="button" title="Refresh"
            hx-post="/sources/{{.ID}}/refresh" hx-swap="none">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
    </button>
    <button class="icon-btn icon-btn--danger" type="button" title="Remove"
            hx-delete="/sources/{{.ID}}" hx-target="#sources-list" hx-swap="outerHTML"
            hx-confirm="Remove {{.Title}} and all its items?">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </div>
</li>
{{end}}
