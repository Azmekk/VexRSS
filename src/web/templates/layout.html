{{define "layout"}}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#111113">
  <title>VexRSS{{with .PageTitle}} — {{.}}{{end}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="stylesheet" href="{{staticURL "app.css"}}">
  <script src="https://unpkg.com/htmx.org@2.0.4" defer></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <a href="/settings" class="icon-btn {{if eq .PageName "settings"}}icon-btn--active{{end}}" aria-label="Settings" title="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </a>
      <div class="clock" aria-live="polite">
        <time id="clock-time">--:--</time>
        <span id="clock-date" class="clock__date"></span>
      </div>
    </div>
    <a class="topbar__brand" href="/">VexRSS</a>
    <div class="topbar__right">
      <button id="weather-pill" class="weather-pill" aria-label="Weather">
        <span class="weather-pill__icon">⛅</span>
        <span class="weather-pill__temp">--°</span>
      </button>
    </div>
  </header>

  <main class="main">
    {{template "content" .}}
  </main>

  <div id="weather-modal" class="modal" hidden>
    <div class="modal__panel">
      <h3>Set your location</h3>
      <p class="muted">Used only for the weather widget.</p>
      <form id="weather-form" onsubmit="return false;">
        <input id="weather-input" class="input" type="text" placeholder="e.g. Sofia, Bulgaria" autocomplete="off">
        <div class="modal__row">
          <button type="button" class="btn" id="weather-cancel">Cancel</button>
          <button type="submit" class="btn btn--primary" id="weather-save">Save</button>
        </div>
        <div id="weather-error" class="modal__error" hidden></div>
      </form>
    </div>
  </div>

  <script src="{{staticURL "app.js"}}" defer></script>
</body>
</html>
{{end}}
