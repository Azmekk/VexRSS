{{define "index"}}{{template "layout" .}}{{end}}

{{define "content"}}
<section class="filterbar" aria-label="Filters">
  <form id="filter-form" class="filterbar__form"
        hx-get="/cards" hx-target="#cards" hx-swap="innerHTML" hx-push-url="false"
        hx-trigger="change from:select, change from:input, submit, refresh-cards from:body, sources-changed from:body">
    <!-- Marker so the server can distinguish "form submitted with no ticks" from
         "first page load, no form submission yet". parseFilter falls back to
         defaults when this is absent. -->
    <input type="hidden" name="filtered" value="1">

    <button type="button" id="shuffle-btn" class="btn btn--ghost"
            hx-get="/cards" hx-target="#cards" hx-swap="innerHTML"
            hx-include="#filter-form" hx-vals='{"sort": "shuffle"}'>
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Shuffle
    </button>

    <div class="select">
      <span class="select__label">Sort</span>
      <select name="sort">
        <option value="new" {{if .Filter.IsSort "new"}}selected{{end}}>Newest</option>
        <option value="old" {{if .Filter.IsSort "old"}}selected{{end}}>Oldest</option>
        <option value="shuffle" {{if .Filter.IsSort "shuffle"}}selected{{end}}>Random</option>
      </select>
    </div>

    <div class="select">
      <span class="select__label">Source</span>
      <select name="source" id="source-select">
        <option value="all" {{if .Filter.IsSource "all"}}selected{{end}}>All sources</option>
        {{range .Sources}}
          <option value="{{.ID}}" {{if $.Filter.IsSource (printf "%d" .ID)}}selected{{end}}>{{.Title}}</option>
        {{end}}
      </select>
    </div>

    <label class="toggle" title="Only items present in the latest fetch from their source">
      <input type="checkbox" name="fresh" value="1" {{if .Filter.FreshOnly}}checked{{end}}>
      <span class="toggle__track" aria-hidden="true"><span class="toggle__dot"></span></span>
      <span class="toggle__label">Fresh</span>
    </label>

    <label class="toggle" title="Hide items you've already clicked through">
      <input type="checkbox" name="unseen" value="1" {{if .Filter.UnseenOnly}}checked{{end}}>
      <span class="toggle__track" aria-hidden="true"><span class="toggle__dot"></span></span>
      <span class="toggle__label">Unseen</span>
    </label>

    <label class="toggle" title="Hide cards that have no image">
      <input type="checkbox" name="with_image" value="1" {{if .Filter.WithImage}}checked{{end}}>
      <span class="toggle__track" aria-hidden="true"><span class="toggle__dot"></span></span>
      <span class="toggle__label">With image</span>
    </label>
  </form>
</section>

<section id="cards" class="cards">
  {{template "cards" .}}
</section>
{{end}}
