{{define "index"}}{{template "layout" .}}{{end}}

{{define "content"}}
<section class="filterbar" aria-label="Filters">
  <form id="filter-form" class="filterbar__form"
        hx-get="/cards" hx-target="#cards" hx-swap="innerHTML" hx-push-url="false"
        hx-trigger="change from:select, submit, refresh-cards from:body, sources-changed from:body">
    <button type="button" id="shuffle-btn" class="btn btn--ghost"
            hx-get="/cards?sort=shuffle" hx-target="#cards" hx-swap="innerHTML"
            hx-include="#source-select">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
      Shuffle
    </button>

    <div class="select">
      <span class="select__label">Sort</span>
      <select name="sort">
        <option value="new" {{if .Filter.IsSort "new"}}selected{{end}}>Newest</option>
        <option value="old" {{if .Filter.IsSort "old"}}selected{{end}}>Oldest</option>
        <option value="shuffle" {{if .Filter.IsSort "shuffle"}}selected{{end}}>Random</option>
      </select>
    </div>

    <div class="select">
      <span class="select__label">Source</span>
      <select name="source" id="source-select">
        <option value="all" {{if .Filter.IsSource "all"}}selected{{end}}>All sources</option>
        {{range .Sources}}
          <option value="{{.ID}}" {{if $.Filter.IsSource (printf "%d" .ID)}}selected{{end}}>{{.Title}}</option>
        {{end}}
      </select>
    </div>
  </form>
</section>

<section id="cards" class="cards">
  {{template "cards" .}}
</section>
{{end}}
