{{define "settings"}}{{template "layout" .}}{{end}}

{{define "content"}}
<section class="settings">
  <header class="settings__head">
    <a class="settings__back" href="/" aria-label="Back to feed">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Feed
    </a>
    <h1 class="settings__title">Sources</h1>
    <p class="settings__sub">Add feeds, rename them, refresh or remove.</p>
  </header>

  <form class="settings__add"
        hx-post="/sources"
        hx-target="#sources-list"
        hx-swap="outerHTML"
        hx-on::after-request="if(event.detail.successful){this.reset();}">
    <label class="settings__add-label" for="feed-url-input">Add RSS / Atom feed</label>
    <div class="settings__add-row">
      <input id="feed-url-input" class="input" type="url" name="feed_url"
             placeholder="https://example.com/feed.xml" required autocomplete="off">
      <button class="btn btn--primary" type="submit">Add feed</button>
    </div>
    <p class="settings__hint">Tip: try <code>https://hnrss.org/frontpage</code>, <code>https://www.theverge.com/rss/index.xml</code>, or <code>https://xkcd.com/rss.xml</code></p>
  </form>

  {{template "sources_list" .Sources}}
</section>
{{end}}
